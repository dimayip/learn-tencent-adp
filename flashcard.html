<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>闪卡复习 — Tencent Cloud ADP 学习工坊</title>
  <meta name="description" content="用闪卡模式快速复习腾讯云智能体开发平台 140 个核心知识点，支持键盘快捷键。">
  <meta name="robots" content="index, follow">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FBBF24">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/minimal.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-container">
      <a href="index.html" class="nav-brand">
        <span class="nav-brand-emoji">🤖</span>
        <span>Tencent Cloud ADP 学习工坊</span>
      </a>
      <div class="nav-links">
        <a href="learn.html" class="nav-link">学习</a>
        <a href="flashcard.html" class="nav-link active">闪卡</a>
        <a href="roots.html" class="nav-link">索引</a>
        <a href="progress.html" class="nav-link">进度</a>
      </div>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <h1>闪卡复习</h1>
      <p>点击卡片翻面，查看详细说明</p>
    </div>

    <div class="flashcard-container">
      <div class="flashcard-progress">
        <span id="progressText">第 1 / 140 张</span>
        <span>已掌握 <strong id="masteredCount">0</strong></span>
      </div>

      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="flashcard-inner">
          <div class="flashcard-front">
            <div class="flashcard-root" id="frontRoot">—</div>
            <div class="flashcard-meaning" id="frontMeaning">—</div>
            <span class="flashcard-origin" id="frontOrigin">—</span>
            <div class="flashcard-tip" style="margin-top: 24px;">点击卡片或按 空格 翻转 · ← → 切换</div>
          </div>
          <div class="flashcard-back">
            <div class="flashcard-root" id="backRoot">—</div>
            <div class="flashcard-description" id="backDescription">—</div>
            <div id="backExamples" style="margin-top: 12px;"></div>
          </div>
        </div>
      </div>

      <div class="flashcard-controls">
        <button class="btn btn-ghost" onclick="prevCard(); event.stopPropagation();">← 上一张</button>
        <button class="btn btn-secondary" onclick="markMastered(); event.stopPropagation();" id="masteredBtn">✓ 已掌握</button>
        <button class="btn btn-primary" onclick="nextCard(); event.stopPropagation();">下一张 →</button>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="js/wordData.js"></script>
  <script src="js/storage.js"></script>
  <script>
    let currentIndex = 0;

    function showToast(msg) {
      const t = document.getElementById('toast');
      if (!t) return;
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    function loadCard(index) {
      currentIndex = index;
      const root = WordRoots[index];

      // 重置翻面
      document.getElementById('flashcard').classList.remove('flipped');

      // 正面
      document.getElementById('frontRoot').textContent = root.root;
      document.getElementById('frontMeaning').textContent = root.meaning;
      document.getElementById('frontOrigin').textContent = root.origin;

      // 背面
      document.getElementById('backRoot').textContent = root.root;
      document.getElementById('backDescription').textContent = root.description;

      // 例子
      const exContainer = document.getElementById('backExamples');
      exContainer.innerHTML = '';
      (root.examples || []).slice(0, 2).forEach(ex => {
        const item = document.createElement('div');
        item.style.padding = '8px 12px';
        item.style.background = 'var(--color-bg-secondary)';
        item.style.borderRadius = '6px';
        item.style.marginBottom = '8px';
        item.style.fontSize = '0.9rem';
        const w = document.createElement('strong');
        w.textContent = ex.word + ': ';
        const m = document.createElement('span');
        m.textContent = ex.meaning;
        m.style.color = 'var(--color-text-secondary)';
        item.appendChild(w); item.appendChild(m);
        exContainer.appendChild(item);
      });

      // 进度
      document.getElementById('progressText').textContent = '第 ' + (index + 1) + ' / ' + WordRoots.length + ' 张';
      document.getElementById('masteredCount').textContent = getMasteredCount();

      // 掌握按钮状态
      const btn = document.getElementById('masteredBtn');
      if (isMastered(root.id)) {
        btn.textContent = '✓ 已掌握';
        btn.style.background = 'var(--color-success)';
        btn.style.color = 'white';
        btn.style.borderColor = 'var(--color-success)';
      } else {
        btn.textContent = '标为已掌握';
        btn.style.background = '';
        btn.style.color = '';
        btn.style.borderColor = '';
      }

      markItemVisited(root.id);
    }

    function flipCard() {
      document.getElementById('flashcard').classList.toggle('flipped');
    }

    function nextCard() {
      const next = (currentIndex + 1) % WordRoots.length;
      loadCard(next);
    }

    function prevCard() {
      const prev = (currentIndex - 1 + WordRoots.length) % WordRoots.length;
      loadCard(prev);
    }

    function markMastered() {
      const root = WordRoots[currentIndex];
      const newState = !isMastered(root.id);
      saveMastered(root.id, newState);
      showToast(newState ? '✓ 已标记为已掌握' : '✓ 已取消标记');
      loadCard(currentIndex);
    }

    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'ArrowLeft') prevCard();
      else if (e.key === 'ArrowRight') nextCard();
      else if (e.key === ' ') { e.preventDefault(); flipCard(); }
      else if (e.key === 'm' || e.key === 'M') markMastered();
    });

    loadCard(0);

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
